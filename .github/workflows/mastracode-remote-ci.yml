name: MastraCode Remote

on:
  pull_request:
    branches: [main]
    paths:
      - 'mastracode/**'
      - 'packages/core/src/agent-controller/**'
      - '.github/actions/setup-pnpm-node/**'
      - '.github/codeql/mastracode-remote.yml'
      - '.github/workflows/mastracode-remote-ci.yml'
      - '.github/workflows/mastracode-remote-release.yml'
      - '.github/CODEOWNERS'
      - 'SECURITY.md'
      - '.editorconfig'
      - '.node-version'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'plans/**'
  push:
    branches: [main]
    paths:
      - 'mastracode/**'
      - 'packages/core/src/agent-controller/**'
      - '.github/actions/setup-pnpm-node/**'
      - '.github/codeql/mastracode-remote.yml'
      - '.github/workflows/mastracode-remote-ci.yml'
      - '.github/workflows/mastracode-remote-release.yml'
      - '.github/CODEOWNERS'
      - 'SECURITY.md'
      - '.editorconfig'
      - '.node-version'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'plans/**'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: mastracode-remote-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate package
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@641a925cfafe92d0fdf8b239ba4053e3f8d99d6d
        with:
          languages: javascript-typescript
          config-file: ./.github/codeql/mastracode-remote.yml

      - name: Setup pnpm and Node.js
        uses: ./.github/actions/setup-pnpm-node

      - name: Review dependency changes
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294
        with:
          fail-on-severity: high
          comment-summary-in-pr: never

      - name: Run MastraCode Remote checks
        run: pnpm check:mastracode

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: mastracode-coverage
          path: mastracode/coverage
          if-no-files-found: error
          retention-days: 14

      - name: Analyze source with CodeQL
        uses: github/codeql-action/analyze@641a925cfafe92d0fdf8b239ba4053e3f8d99d6d
        with:
          category: /language:javascript-typescript
