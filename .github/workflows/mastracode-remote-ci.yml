name: MastraCode Remote

on:
  pull_request:
    branches: [main]
    paths:
      - 'mastracode/**'
      - 'packages/core/src/agent-controller/**'
      - '.github/actions/setup-pnpm-node/**'
      - '.github/codeql/mastracode-remote.yml'
      - '.github/workflows/mastracode-remote-ci.yml'
      - '.github/workflows/mastracode-remote-release.yml'
      - '.github/CODEOWNERS'
      - 'SECURITY.md'
      - '.editorconfig'
      - '.node-version'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'plans/**'
  push:
    branches: [main]
    paths:
      - 'mastracode/**'
      - 'packages/core/src/agent-controller/**'
      - '.github/actions/setup-pnpm-node/**'
      - '.github/codeql/mastracode-remote.yml'
      - '.github/workflows/mastracode-remote-ci.yml'
      - '.github/workflows/mastracode-remote-release.yml'
      - '.github/CODEOWNERS'
      - 'SECURITY.md'
      - '.editorconfig'
      - '.node-version'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'plans/**'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: mastracode-remote-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate package
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9
        with:
          languages: javascript-typescript
          config-file: ./.github/codeql/mastracode-remote.yml

      - name: Setup pnpm and Node.js
        uses: ./.github/actions/setup-pnpm-node

      - name: Review dependency changes
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294
        with:
          fail-on-severity: high
          comment-summary-in-pr: never

      - name: Restore Turbo build cache
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Run MastraCode Remote checks
        run: pnpm check:mastracode

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: mastracode-coverage
          path: mastracode/coverage
          if-no-files-found: error
          retention-days: 14

      - name: Analyze source with CodeQL
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9
        with:
          category: /language:javascript-typescript
