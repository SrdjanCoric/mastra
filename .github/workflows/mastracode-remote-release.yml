name: Release MastraCode Remote

on:
  workflow_dispatch:
    inputs:
      version:
        description: Published package version, without a leading v
        required: true
        type: string

permissions:
  checks: read
  contents: read
  id-token: write

env:
  PACKAGE_NAME: mastracode-remote

jobs:
  publish:
    name: Verify and publish
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment: npm-release

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Setup pnpm and Node.js
        uses: ./.github/actions/setup-pnpm-node

      - name: Restore Turbo build cache
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-release-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-release-
            turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Require successful package CI
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ github.sha }}
        run: |
          for attempt in {1..60}; do
            conclusion=$(gh api "repos/$GITHUB_REPOSITORY/commits/$RELEASE_SHA/check-runs" \
              --jq '[.check_runs[] | select(.name == "Validate package" and .conclusion == "success")][0].conclusion // ([.check_runs[] | select(.name == "Validate package")][0].conclusion // "pending")')
            if [ "$conclusion" = "success" ]; then
              exit 0
            fi
            if [ "$conclusion" != "pending" ] && [ "$conclusion" != "null" ]; then
              echo "Required Validate package check ended with $conclusion." >&2
              exit 1
            fi
            sleep 10
          done
          echo "Timed out waiting for the required Validate package check." >&2
          exit 1

      - name: Verify requested version
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          package_version=$(node -p "require('./mastracode/package.json').version")
          if [ "$package_version" != "$REQUESTED_VERSION" ]; then
            echo "Package version $package_version does not match requested version $REQUESTED_VERSION." >&2
            exit 1
          fi
          if npm view "$PACKAGE_NAME@$REQUESTED_VERSION" version >/dev/null 2>&1; then
            echo "$PACKAGE_NAME@$REQUESTED_VERSION is already published." >&2
            exit 1
          fi

      - name: Build MastraCode Remote
        run: pnpm build:mastracode

      - name: Verify release configuration
        run: pnpm --filter ./mastracode verify:release-configuration

      - name: Build exact release archive
        id: archive
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          mkdir -p "$RUNNER_TEMP/mastracode-release"
          pnpm --filter ./mastracode pack --pack-destination "$RUNNER_TEMP/mastracode-release"
          archive="$RUNNER_TEMP/mastracode-release/$PACKAGE_NAME-$REQUESTED_VERSION.tgz"
          test -f "$archive"
          echo "path=$archive" >> "$GITHUB_OUTPUT"
          echo "sha256=$(sha256sum "$archive" | cut -d ' ' -f 1)" >> "$GITHUB_OUTPUT"
          echo "bytes=$(stat -c %s "$archive")" >> "$GITHUB_OUTPUT"

      - name: Verify exact release archive
        run: pnpm --filter ./mastracode verify:publication-package -- "${{ steps.archive.outputs.path }}"

      - name: Upload verified archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: mastracode-remote-${{ inputs.version }}
          path: ${{ steps.archive.outputs.path }}
          if-no-files-found: error
          retention-days: 30

      - name: Publish verified archive
        run: npm publish "${{ steps.archive.outputs.path }}" --access public --provenance

      - name: Record publication proof
        run: |
          echo "Published $PACKAGE_NAME@${{ inputs.version }}"
          echo "Archive SHA-256: ${{ steps.archive.outputs.sha256 }}"
          echo "Archive bytes: ${{ steps.archive.outputs.bytes }}"
